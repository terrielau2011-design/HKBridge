<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HK橋樑 v3 - 新來港家庭融入導航系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#FF6B35;--sec:#4ECDC4;--acc:#FFE66D;--pur:#A855F7;--pink:#F472B6;--blue:#3B82F6;--green:#10B981;--rose:#F43F5E;--amber:#F59E0B;--bg:#FFF8F0;--card:#fff;--txt:#1F2937;--txtL:#6B7280;--ok:#10B981;--err:#EF4444;--warn:#F59E0B;--r:14px;--sh:0 2px 8px rgba(0,0,0,.08)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
#app{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative}

/* Tab Bar */
.tab-bar{display:flex;background:var(--card);border-top:1px solid #E5E7EB;padding:8px 0;padding-bottom:env(safe-area-inset-bottom,8px);flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:11px;color:var(--txtL);transition:.2s}.tab-btn.on{color:var(--pri)}.tab-btn .ti{font-size:28px}

/* Pages */
.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 28px}.page.on{display:block}
.lp{display:none;flex:1;flex-direction:column;overflow:hidden}.lp.on{display:flex}
.lh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--card);border-bottom:1px solid #E5E7EB;flex-shrink:0}
.lh .bb{font-size:16px;color:var(--pri);font-weight:600;padding:6px 10px;min-height:44px}
.lh .lt{font-size:18px;font-weight:700}.lh .ls{font-size:18px;font-weight:700;color:var(--pri)}
.lb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* 首頁 - 龍寵物 */
.hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ps{display:flex;align-items:center;gap:10px}.pe{font-size:52px}.pn{font-size:18px;font-weight:700}.pm{font-size:13px;color:var(--txtL)}
.sr{display:flex;gap:14px}.si{text-align:center}.sv{font-size:17px;font-weight:700}.sl{font-size:11px;color:var(--txtL)}

/* XP bar + 升級提示 */
.xbw{margin-bottom:10px}.xbb{height:12px;background:#E5E7EB;border-radius:99px;overflow:hidden}.xbf{height:100%;background:linear-gradient(90deg,var(--pri),#FF8F5E);border-radius:99px;transition:width .5s}
.xxt{font-size:11px;color:var(--txtL);text-align:right;margin-top:3px}
.lvl-hint{font-size:12px;color:var(--pri);font-weight:600;margin-top:2px;margin-bottom:6px}

/* 體力條 */
.stw{margin-bottom:14px}.stl{font-size:12px;color:var(--txtL);margin-bottom:3px;display:flex;justify-content:space-between}
.stb{height:14px;background:#E5E7EB;border-radius:99px;overflow:hidden}.stf{height:100%;border-radius:99px;transition:width .5s}
.stf.high{background:var(--ok)}.stf.mid{background:var(--warn)}.stf.low{background:var(--err)}

/* Section title */
.st{font-size:17px;font-weight:700;margin-bottom:10px;margin-top:14px}

/* 每日任務 */
.dr{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.dc{flex:1;min-width:60px;background:var(--card);border-radius:var(--r);padding:10px 6px;text-align:center;border:2px solid #E5E7EB;font-size:11px;transition:.2s}.dc.dn{border-color:var(--ok);background:#F0FDF4}.dc .ci{font-size:20px;display:block;margin-bottom:2px}

/* 社交任務 */
.social-card{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:var(--r);padding:16px;margin-bottom:14px;border:2px solid var(--warn)}
.social-card .sc-title{font-size:15px;font-weight:700;color:#92400E;margin-bottom:6px}
.social-card .sc-desc{font-size:14px;color:#78350F;margin-bottom:10px}
.social-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:700;transition:transform .15s}.social-btn:active{transform:scale(.97)}
.social-btn.pending{background:var(--pri);color:#fff}.social-btn.done{background:var(--ok);color:#fff}
.social-btn.parent-confirm{background:var(--blue);color:#fff;margin-left:8px}

/* ===== 五大支柱卡片 ===== */
.pillars{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.pillar{display:flex;align-items:center;background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);transition:transform .15s;min-height:72px;border-left:5px solid var(--pri)}.pillar:active{transform:scale(.98)}
.pillar .pi-icon{font-size:32px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:12px;margin-right:12px;flex-shrink:0}
.pillar .pi-body{flex:1}.pillar .pi-title{font-size:16px;font-weight:700}.pillar .pi-sub{font-size:12px;color:var(--txtL);margin-top:2px}.pillar .pi-arrow{font-size:22px;color:var(--txtL)}
.pillar.locked{opacity:.5;filter:grayscale(.6)}.pillar.locked .pi-arrow::after{content:'🔒';font-size:16px;margin-left:4px}
.pillar .pi-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;margin-left:8px}

/* 五大支柱顏色 */
.pillar-life{border-left-color:var(--green)}.pillar-life .pi-icon{background:#F0FDF4}
.pillar-lang{border-left-color:var(--sec)}.pillar-lang .pi-icon{background:#F0FDFA}
.pillar-acad{border-left-color:var(--pur)}.pillar-acad .pi-icon{background:#FAF5FF}
.pillar-fun{border-left-color:var(--amber)}.pillar-fun .pi-icon{background:#FFFBEB}
.pillar-family{border-left-color:var(--rose)}.pillar-family .pi-icon{background:#FFF1F2}

/* 得分面板 */
.score-panel{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.score-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F3F4F6}
.score-row:last-child{border-bottom:none}
.score-icon{font-size:20px;width:30px;text-align:center;margin-right:10px}
.score-info{flex:1}.score-name{font-size:14px;font-weight:600}.score-bar{height:6px;background:#E5E7EB;border-radius:99px;margin-top:4px;overflow:hidden}
.score-fill{height:100%;border-radius:99px;transition:width .5s}
.score-val{font-size:16px;font-weight:700;margin-left:10px;min-width:40px;text-align:right}
.score-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0 4px;font-size:14px;color:var(--txtL)}
.score-total .stv{font-size:22px;font-weight:700;color:var(--pri)}
.score-lvl-hint{font-size:12px;color:var(--pri);font-weight:600;text-align:right}

/* 列表卡片 */
.sc{display:flex;align-items:center;background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh);transition:transform .15s;min-height:64px}.sc:active{transform:scale(.98)}.sc .si2{font-size:34px;margin-right:14px}.sc .sf{flex:1}.sc .snt{font-size:16px;font-weight:700}.sc .snc{font-size:13px;color:var(--txtL);margin-top:3px}.sc .sa{font-size:24px;color:var(--txtL)}
.lbs{background:var(--pur);border-radius:6px;padding:3px 10px;color:#fff;font-size:11px;font-weight:700;display:inline-block;margin-bottom:5px}

/* 連連看 */
.mh{background:#FEF3C7;border-radius:10px;padding:10px;margin-bottom:12px;text-align:center;font-size:14px;color:#92400E}
.mbd{display:flex;justify-content:center;gap:16px;flex:1}.mcl{flex:1;max-width:170px}.mcl-l{font-size:14px;font-weight:700;color:var(--txtL);text-align:center;margin-bottom:10px}
.mcd{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;text-align:center;border:2px solid #E5E7EB;font-size:22px;font-weight:700;transition:all .2s;user-select:none;min-height:52px}
.mcd.sel{border-color:var(--pri);background:#FFF5F0;transform:scale(1.03)}.mcd.mat{border-color:var(--ok);background:#F0FDF4;color:var(--ok)}.mcd.wrg{border-color:var(--err);background:#FEF2F2;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.mhb{background:#EFF6FF;border-radius:var(--r);padding:12px;margin-top:12px;font-size:14px;color:#1E40AF;text-align:center}

/* 粵語 */
.cc{font-size:60px;font-weight:700;text-align:center;margin:20px 0 10px}.cj{font-size:22px;color:var(--sec);font-weight:600;text-align:center;letter-spacing:2px;margin-bottom:20px}
.mnc{background:#EFF6FF;border-radius:var(--r);padding:16px;text-align:center;margin-bottom:18px}.mnl{font-size:13px;color:var(--blue);margin-bottom:5px}.mnt{font-size:22px;font-weight:700;color:#1E40AF}
.cbs{display:flex;flex-direction:column;gap:12px;margin-bottom:22px}.cbt{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:var(--r);font-size:17px;font-weight:700;transition:transform .15s;min-height:52px}.cbt:active{transform:scale(.97)}.cbt.pl{background:var(--sec);color:#fff}.cbt.rc{background:var(--card);color:var(--pink);border:2px solid var(--pink)}
.bdc{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}.bdl{font-size:13px;color:var(--txtL);margin-bottom:10px}.bdr{display:flex;justify-content:center;gap:28px}.bdi{text-align:center}.bdc2{font-size:26px;font-weight:700}.bdj{font-size:15px;color:var(--sec);font-weight:600;margin-top:5px}

/* 測驗 */
.qpb{display:flex;flex-direction:column;align-items:center;background:#EFF6FF;border-radius:22px;padding:32px;margin-bottom:22px}.qpi{font-size:60px;margin-bottom:10px}.qpt{font-size:17px;color:var(--blue);font-weight:600}
.qis{font-size:16px;color:var(--txtL);text-align:center;margin-bottom:18px}
.ob{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:10px;text-align:center;border:2px solid #E5E7EB;font-size:22px;font-weight:700;transition:all .2s;min-height:56px}.ob:active{transform:scale(.97)}.ob.sl2{border-color:var(--pri);background:#FFF5F0}.ob.co{border-color:var(--ok);background:#F0FDF4}.ob.wr{border-color:var(--err);background:#FEF2F2}

/* 數學 */
.qcd{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}.ql{font-size:13px;color:var(--txtL);margin-bottom:10px}.qt3{font-size:19px;font-weight:600;line-height:1.7}
.tb{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}.tbb{display:flex;align-items:center;gap:5px;background:#F3F4F6;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;min-height:40px}.tbb .tbi{font-size:16px}
.mgc{background:#FDF4FF;border-radius:var(--r);padding:16px;margin-bottom:14px;border:2px solid #D8B4FE}.mgt{font-size:15px;font-weight:700;color:#7C3AED;margin-bottom:10px}
.tmi{display:flex;align-items:center;flex-wrap:wrap;margin-bottom:6px;gap:5px}.tmo{font-size:17px;font-weight:700;color:#9333EA}.tma{color:#C084FC}.tmt{font-size:14px;color:#6B21A8;flex:1}
.htc{background:#FEF3C7;border-radius:var(--r);padding:14px;margin-bottom:14px;font-size:15px;color:#92400E}
.ir{display:flex;gap:10px;margin-bottom:14px}.ai{flex:1;background:var(--card);border-radius:var(--r);padding:16px;font-size:22px;font-weight:700;border:2px solid #E5E7EB;color:var(--txt);outline:none;min-height:56px}.ai:focus{border-color:var(--pri)}
.sbt{background:var(--pri);border-radius:var(--r);padding:0 28px;font-size:18px;font-weight:700;color:#fff;transition:opacity .2s;min-height:56px}.sbt:disabled{opacity:.4}
.fb{display:flex;align-items:flex-start;border-radius:var(--r);padding:16px;margin-bottom:14px;gap:14px}.fb.co2{background:#F0FDF4;border:2px solid var(--ok)}.fb.wr2{background:#FEF2F2;border:2px solid var(--err)}.fe{font-size:30px}.fi{flex:1}.ft2{font-size:17px;font-weight:700}.fd{font-size:14px;color:var(--txtL);margin-top:3px}.fs{font-size:14px;color:var(--txtL);margin-top:5px;font-style:italic}
.nb{background:var(--pri);border-radius:var(--r);padding:16px;text-align:center;font-size:17px;font-weight:700;color:#fff;transition:transform .15s;min-height:52px}.nb:active{transform:scale(.97)}

/* 結果 */
.rp{display:none;flex:1;justify-content:center;align-items:center;flex-direction:column;padding:32px;text-align:center}.rp.on{display:flex}.re{font-size:72px;margin-bottom:14px}.rt2{font-size:34px;font-weight:700;margin-bottom:10px}.rs2{font-size:17px;color:var(--txtL);margin-bottom:28px}.rss{display:flex;gap:36px;margin-bottom:28px}.rsv{font-size:26px;font-weight:700;color:var(--pri)}.rsl{font-size:13px;color:var(--txtL);margin-top:5px}.rbtn{background:var(--pri);border-radius:18px;padding:16px 36px;font-size:17px;font-weight:700;color:#fff;min-height:52px}

/* 龍寵物頁 */
.pd{background:var(--card);border-radius:22px;padding:32px;text-align:center;margin-bottom:14px;box-shadow:var(--sh)}.pbg{font-size:88px;margin-bottom:10px}.pnb{font-size:24px;font-weight:700;margin-bottom:6px}.pmg{font-size:15px;color:var(--txtL);margin-bottom:14px}
.hpbg{height:12px;background:#E5E7EB;border-radius:99px;overflow:hidden;width:80%;margin:0 auto}.hpf{height:100%;background:var(--ok);border-radius:99px;transition:width .5s}.hpl{font-size:11px;color:var(--txtL);margin-top:5px}
.lvc{display:flex;align-items:center;background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:14px}.lvb{background:var(--pri);border-radius:var(--r);padding:10px 16px;margin-right:16px;font-weight:700;color:#fff;font-size:15px}.lvi{flex:1}.lvt{font-size:17px;font-weight:700}.lvx{font-size:13px;color:var(--txtL)}
.ssc{display:flex;gap:10px;margin-bottom:14px}.ssi{flex:1;background:var(--card);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh)}.sse{font-size:26px;margin-bottom:6px}.ssv2{font-size:22px;font-weight:700}.ssl{font-size:11px;color:var(--txtL)}
.pg{display:flex;flex-wrap:wrap;gap:10px}.pi2{width:calc(33.33% - 7px);background:var(--card);border-radius:var(--r);padding:14px;text-align:center;border:2px solid #E5E7EB;transition:.2s;min-height:80px}.pi2.ac{border-color:var(--pri);background:#FFF5F0}.pi2.lk{opacity:.35}.pie{font-size:36px}.pin{font-size:12px;color:var(--txtL);margin-top:4px}
.lr{display:flex;align-items:center;background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:5px}.lr.cur{background:#FFF5F0;border:1px solid var(--pri)}.lr .lrl{font-weight:700;width:50px;font-size:15px}.lr .lrt{flex:1;font-size:14px;color:var(--txtL)}.lr .lrt.rd{color:var(--txt);font-weight:600}.lr .lrx{font-size:12px;color:var(--txtL);width:60px;text-align:right}.lr .lrm{color:var(--pri);margin-left:5px;font-size:13px}

/* 家長 */
.pp{background:#F8FAFC}.pht{font-size:24px;font-weight:700}.phs{font-size:15px;color:var(--txtL);margin-top:5px}
.smc{background:var(--card);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:var(--sh)}.cmt{font-size:17px;font-weight:700;margin-bottom:14px}
.sms{display:flex;justify-content:space-around;margin-bottom:14px}.smv{font-size:24px;font-weight:700;color:var(--pri);text-align:center}.sml{font-size:11px;color:var(--txtL);text-align:center;margin-top:3px}
.pbg2{height:8px;background:#E5E7EB;border-radius:99px;overflow:hidden}.pf2{height:100%;background:var(--pri);border-radius:99px;transition:width .5s}
.sur{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #F3F4F6}.sur .sui{font-size:20px;margin-right:10px;width:28px}.sur .sun{flex:1;font-size:15px}.sur .sud{font-size:13px;color:var(--txtL)}.sur .sud.dn{color:var(--ok);font-weight:600}
.guc{background:var(--card);border-radius:18px;margin-bottom:10px;overflow:hidden}.guh{display:flex;align-items:center;padding:16px;min-height:56px}.gui{font-size:24px;margin-right:10px}.gut{flex:1;font-size:16px;font-weight:700}.gua{font-size:15px;color:var(--txtL)}
.gub{padding:0 16px 16px}.tpi{padding:12px 0;border-top:1px solid #F3F4F6}.tps{font-size:14px;font-weight:600;margin-bottom:10px}
.tpd{background:#F0FDF4;border-radius:10px;padding:10px 12px;margin-bottom:8px}.tpdl{font-size:11px;font-weight:700;color:var(--ok)}.tpdt{font-size:13px;color:#166534}
.tpn{background:#FEF2F2;border-radius:10px;padding:10px 12px}.tpnl{font-size:11px;font-weight:700;color:var(--err)}.tpnt{font-size:13px;color:#991B1B}

/* AI 客服 */
.chat-box{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--sh);max-height:360px;display:flex;flex-direction:column}
.chat-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.chat-msgs{flex:1;overflow-y:auto;margin-bottom:10px;max-height:200px}
.chat-bubble{padding:10px 14px;border-radius:14px;margin-bottom:8px;font-size:13px;line-height:1.5;max-width:90%}
.chat-bubble.bot{background:#F3F4F6;color:var(--txt);border-bottom-left-radius:4px}
.chat-bubble.user{background:var(--pri);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.chat-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chat-qbtn{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:20px;padding:6px 12px;font-size:12px;color:var(--blue);font-weight:600;transition:transform .15s}.chat-qbtn:active{transform:scale(.95)}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;border:2px solid #E5E7EB;border-radius:var(--r);padding:10px 14px;font-size:14px;outline:none;color:var(--txt)}.chat-input:focus{border-color:var(--pri)}
.chat-send{background:var(--blue);border-radius:var(--r);padding:0 18px;color:#fff;font-weight:700;font-size:14px;min-height:44px}

/* 導航 */
.nr{display:flex;gap:10px;padding:14px 16px;flex-shrink:0}.nrb{flex:1;padding:14px;border-radius:var(--r);text-align:center;border:1px solid #E5E7EB;font-size:15px;color:var(--txtL);transition:transform .15s;min-height:52px}.nrb:active{transform:scale(.97)}.nrb.pm{background:var(--pri);border:none;color:#fff;font-weight:700}
.pbr{height:5px;background:#E5E7EB}.pbf{height:100%;background:var(--pur);transition:width .3s}

/* 體力不足彈窗 */
.stamina-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;justify-content:center;align-items:center;padding:32px}.stamina-modal.on{display:flex}
.stamina-modal-content{background:var(--card);border-radius:22px;padding:32px;text-align:center;max-width:320px;width:100%}
.stamina-modal-content .sm-emoji{font-size:64px;margin-bottom:12px}
.stamina-modal-content .sm-title{font-size:20px;font-weight:700;margin-bottom:8px}
.stamina-modal-content .sm-desc{font-size:14px;color:var(--txtL);margin-bottom:20px}
.stamina-modal-content .sm-btn{background:var(--ok);border-radius:var(--r);padding:14px 28px;font-size:16px;font-weight:700;color:#fff}

/* Phonics */
.ph-card{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh);text-align:center}
.ph-letter{font-size:72px;font-weight:700;color:var(--blue);margin-bottom:8px}
.ph-sound{font-size:20px;color:var(--sec);font-weight:600;margin-bottom:12px}
.ph-word{font-size:16px;color:var(--txtL)}
.ph-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px}
.ph-btn{width:56px;height:56px;border-radius:var(--r);background:var(--card);border:2px solid #E5E7EB;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;transition:all .2s}
.ph-btn:active{transform:scale(.93)}.ph-btn.sel{border-color:var(--blue);background:#EFF6FF}.ph-btn.correct{border-color:var(--ok);background:#F0FDF4}.ph-btn.wrong{border-color:var(--err);background:#FEF2F2}

/* 娛樂時光 - 破冰任務卡 */
.ice-card{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:var(--r);padding:16px;margin-bottom:10px;border:2px solid var(--amber)}
.ice-card .ice-q{font-size:15px;font-weight:700;color:#92400E;margin-bottom:6px}

function $(s){return document.getElementById(s)}
function show(id){document.querySelectorAll('.page,.lp,.rp').forEach(e=>e.classList.remove('on'));$(id).classList.add('on')}
function home(){show('pg-home');updHome()}
function go(p){show('pg-'+p);if(p==='cs')renderCS();if(p==='ks')renderKS();if(p==='ms')renderMS();if(p==='ps')renderPS();if(p==='fun')renderFun();if(p==='family')renderFamily()}
function tab(t){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',['home','pet','parent'][i]===t));if(t==='home'){show('pg-home');updHome()}if(t==='pet'){show('pg-pet');renderPet()}if(t==='parent'){show('pg-par');renderPar()}}

function addXP(n,cat){G.xp+=n;G.tXP+=n;if(cat&&G.score[cat]!==undefined)G.score[cat]+=n;let nl=G.lv;for(let i=LVS.length-1;i>=0;i--)if(G.xp>=LVS[i].x){nl=LVS[i].l;break}const oldLv=G.lv;G.lv=nl;
  // 檢查支柱解鎖
  if(nl>oldLv)checkUnlocks(nl)}
function correct(cat){G.streak++;G.tC++;G.tT++;G.pH=Math.min(100,G.pH+5);addXP(10,cat);G.coins+=5}
function wrong(){G.streak=0;G.tT++;G.pH=Math.max(0,G.pH-3)}

// ===== 支柱解鎖檢查 =====
function checkUnlocks(lv){
  PILLARS.forEach(p=>{
    if(!G.unlocked[p.id]&&lv>=p.unlockAt){
      G.unlocked[p.id]=true;
      // 顯示解鎖彈窗
      $('uc-icon').textContent=p.icon;
      $('uc-title').textContent='新領域解鎖！';
      $('uc-desc').textContent='「'+p.name+'」已經開放！你可以探索更多任務啦！';
      $('unlock-modal').classList.add('on');
    }
  });
}

function renderPillars(){
  const h=PILLARS.map(p=>{
    const locked=!G.unlocked[p.id];
    return `<div class="pillar ${p.cls}${locked?' locked':''}" ${locked?'':`onclick="openPillar('${p.id}')"`}>
      <div class="pi-icon">${p.icon}</div>
      <div class="pi-body">
        <div class="pi-title">${p.name}${locked?'<span class="pi-badge" style="background:var(--txtL)">Lv.'+p.unlockAt+' 解鎖</span>':''}</div>

      </div>
      <div class="pi-arrow">${locked?'🔒':'›'}</div>
    </div>`;
  }).join('');
  $('pillar-list').innerHTML=h;
}

  // 得分明細
  h+=`<div class="smc"><div class="cmt">📈 得分明細</div>`;
  const cats=[{id:'life',n:'本土地圖',i:'🗺️'},{id:'lang',n:'語言魔法',i:'🗣️'},{id:'acad',n:'學業試煉',i:'📝'},{id:'fun',n:'娛樂時光',i:'🎮'},{id:'family',n:'家園羈絆',i:'🏠'}];
  cats.forEach(c=>{
    h+=`<div class="sur"><span class="sui">${c.i}</span><span class="sun">${c.n}</span><span class="sud dn">${G.score[c.id]||0} XP</span></div>`;
  });
  h+=`</div>`;
  // 輔導指南
  h+=`<div class="st">💡 輔導與誇獎指南</div>`;
  PG.forEach(g=>{h+=`<div class="guc"><div class="guh" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><span class="gui">${g.i}</span><span class="gut">${g.t}</span><span class="gua">▸</span></div><div class="gub" style="display:none">${g.tips.map(t=>`<div class="tpi"><div class="tps">${t.s}</div><div class="tpd"><div class="tpdl">✅ 這樣說</div><div class="tpdt">${t.d}</div></div><div class="tpn"><div class="tpnl">❌ 別這樣說</div><div class="tpnt">${t.n}</div></div></div>`).join('')}</div></div>`});
  $('pg-par').innerHTML=h;
  setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight},50);
}
function askFAQ(q){chatMsgs.push({role:'user',text:q});const f=FAQ_DB.find(x=>x.q===q);chatMsgs.push({role:'bot',text:f?f.a:'抱歉，我暫時搵唔到相關資訊。你可以試吓用其他關鍵字提問。'});renderPar()}
function sendChat(){const inp=$('chat-inp');const q=inp.value.trim();if(!q)return;chatMsgs.push({role:'user',text:q});
  const found=FAQ_DB.find(f=>f.k.some(k=>q.includes(k)));
  if(found){chatMsgs.push({role:'bot',text:found.a})}
  else{chatMsgs.push({role:'bot',text:'抱歉，我暫時搵唔到相關資訊。你可以試吓撳下面嘅快捷問題，或者用其他關鍵字提問，例如「欺凌」、「功課」、「銀行」等。'})}
  inp.value='';renderPar()}

updHome();
